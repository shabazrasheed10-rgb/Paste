<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PasteBoard</title>
   <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --surface2: #1c1c1f;
      --border: #2a2a2e;
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.1);
      --text: #f0f0f0;
      --muted: #666;
      --success: #47ffb2;
      --error: #ff6b6b;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCREENS ── */
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HOME SCREEN ── */
    #homeScreen {
      padding: 2rem 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--accent); }

    .tagline {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      position: relative;
      min-height: 160px;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: #444;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card-date {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    .card-preview {
      font-size: 0.8rem;
      line-height: 1.6;
      color: #aaa;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      word-break: break-all;
    }

    .card-footer {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-chars {
      font-size: 0.62rem;
      color: var(--muted);
    }

    .card-delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      font-family: 'IBM Plex Mono', monospace;
    }

    .card-delete:hover {
      color: var(--error);
      background: rgba(255,107,107,0.08);
    }

    /* New card button */
    .card-new {
      background: transparent;
      border: 1px dashed #333;
      border-radius: 6px;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-direction: column;
      gap: 0.5rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
    }

    .card-new:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .card-new-icon {
      font-size: 2rem;
      font-weight: 300;
      line-height: 1;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 2;
    }

    /* ── EDITOR SCREEN ── */
    #editorScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: #111113;
      flex-shrink: 0;
      gap: 0.75rem;
    }

    .editor-toolbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .editor-toolbar-right { display: flex; align-items: center; gap: 0.6rem; }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.3rem 0.7rem;
      border-radius: 3px;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .back-btn:hover {
      color: var(--text);
      border-color: #666;
    }

    .editor-stats {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .editor-stats span { color: var(--accent); }

    .tool-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .tool-btn:hover {
      color: var(--text);
      border-color: var(--border);
      background: rgba(255,255,255,0.04);
    }

    .tool-btn.clear:hover {
      color: var(--error);
      border-color: rgba(255,107,107,0.3);
      background: rgba(255,107,107,0.06);
    }

    .sep { width: 1px; height: 16px; background: var(--border); }

    textarea {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.92rem;
      line-height: 1.75;
      padding: 1.4rem 1.5rem;
      resize: none;
      caret-color: var(--accent);
    }

    textarea::placeholder { color: #2a2a2e; }
    textarea:focus { background: #17171a; }
    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Bottom action bar */
    .actions {
      display: flex;
      gap: 0.75rem;
      padding: 1rem 1.2rem;
      border-top: 1px solid var(--border);
      background: #111113;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .btn-undo {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-undo:hover:not(:disabled) {
      border-color: #888;
      background: rgba(255,255,255,0.04);
    }

    .btn-mic {
      flex: 0 0 54px;
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
      padding: 0.8rem;
    }
    .btn-mic:hover {
      color: var(--text);
      border-color: #888;
    }
    .btn-mic.listening {
      color: var(--error);
      border-color: var(--error);
      background: rgba(255,107,107,0.08);
      animation: pulse-mic 1.2s ease-in-out infinite;
    }

    @keyframes pulse-mic {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(255,107,107,0); }
    }

    .btn-redo {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }
    .btn-redo:hover:not(:disabled) {
      border-color: #888;
      background: rgba(255,255,255,0.04);
    }

    .btn-save {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
      font-weight: 700;
    }
    .btn-save:hover {
      background: #f2ff6a;
      box-shadow: 0 0 20px rgba(232,255,71,0.3);
    }

    .icon { width: 15px; height: 15px; flex-shrink: 0; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e1e21;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      padding: 0.55rem 1.1rem;
      border-radius: 3px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>

  <!-- ── HOME SCREEN ── -->
  <div id="homeScreen" class="screen active">
    <header>
      <div class="logo">Paste<span>Board</span></div>
      <div class="tagline">// your boards</div>
    </header>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <!-- ── EDITOR SCREEN ── -->
  <div id="editorScreen" class="screen">
    <div class="editor-toolbar">
      <div class="editor-toolbar-left">
        <button class="back-btn" onclick="goHome()">← back</button>
        <div class="editor-stats">
          <span id="charNum">0</span> chars &nbsp;·&nbsp; <span id="lineNum">0</span> lines
        </div>
      </div>
      <div class="editor-toolbar-right">
        <button class="tool-btn" onclick="pasteFromClipboard()">↓ paste</button>
        <button class="tool-btn" onclick="copyToClipboard()">↑ copy</button>
        <div class="sep"></div>
        <button class="tool-btn clear" onclick="clearBoard()">✕ clear</button>
      </div>
    </div>

    <textarea
      id="board"
      placeholder="Type, paste, or use the mic…"
      spellcheck="false"
      autocorrect="off"
      autocomplete="off"
    ></textarea>

    <div class="actions">
      <button class="btn btn-undo" id="undoBtn" onclick="doUndo()" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
        </svg>
        Undo
      </button>

      <button class="btn btn-mic" id="micBtn" onclick="toggleVoice()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>

      <button class="btn btn-redo" id="redoBtn" onclick="doRedo()" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
        </svg>
        Redo
      </button>

      <button class="btn btn-save" onclick="saveCard()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Storage ────────────────────────────────────────────────────
    const STORE_KEY = 'pasteboard_cards';

    function loadCards() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function saveCards(cards) {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(cards)); }
      catch {}
    }

    // ── State ──────────────────────────────────────────────────────
    let cards = loadCards();
    let currentCardId = null;

    // Editor history
    let hist = [''], idx = 0, isApplying = false;
    let debounce;

    // ── DOM refs ───────────────────────────────────────────────────
    const homeScreen   = document.getElementById('homeScreen');
    const editorScreen = document.getElementById('editorScreen');
    const board        = document.getElementById('board');
    const charNum      = document.getElementById('charNum');
    const lineNum      = document.getElementById('lineNum');
    const undoBtn      = document.getElementById('undoBtn');
    const redoBtn      = document.getElementById('redoBtn');
    const micBtn       = document.getElementById('micBtn');
    const cardsGrid    = document.getElementById('cardsGrid');
    const toast        = document.getElementById('toast');

    // ── Screen routing ─────────────────────────────────────────────
    function showScreen(name) {
      homeScreen.classList.toggle('active', name === 'home');
      editorScreen.classList.toggle('active', name === 'editor');
    }

    // ── Home ───────────────────────────────────────────────────────
    function renderHome() {
      cardsGrid.innerHTML = '';

      if (cards.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = 'No boards yet.<br>Tap <strong>+</strong> to create your first one.';
        cardsGrid.appendChild(empty);
      } else {
        cards.forEach(card => {
          const el = document.createElement('div');
          el.className = 'card';
          el.innerHTML = `
            <div class="card-date">${formatDate(card.updatedAt)}</div>
            <div class="card-preview">${escHtml(card.content) || '<span style="color:#333">Empty board</span>'}</div>
            <div class="card-footer">
              <span class="card-chars">${card.content.length.toLocaleString()} chars</span>
              <button class="card-delete" onclick="deleteCard(event,'${card.id}')">✕</button>
            </div>`;
          el.addEventListener('click', () => openCard(card.id));
          cardsGrid.appendChild(el);
        });
      }

      // Always add the + card last
      const newEl = document.createElement('button');
      newEl.className = 'card-new';
      newEl.innerHTML = '<div class="card-new-icon">+</div><div>new board</div>';
      newEl.onclick = createCard;
      cardsGrid.appendChild(newEl);
    }

    function goHome() {
      stopVoice();
      showScreen('home');
      renderHome();
    }

    // ── Card CRUD ──────────────────────────────────────────────────
    function createCard() {
      const card = {
        id: 'card_' + Date.now(),
        content: '',
        createdAt: Date.now(),
        updatedAt: Date.now()
      };
      cards.unshift(card);
      saveCards(cards);
      openCard(card.id);
    }

    function openCard(id) {
      currentCardId = id;
      const card = cards.find(c => c.id === id);
      if (!card) return;

      // Reset editor state
      board.value = card.content;
      hist = [card.content];
      idx = 0;
      refreshButtons();
      updateStats();

      showScreen('editor');
      board.focus();
    }

    function saveCard() {
      if (!currentCardId) return;
      const card = cards.find(c => c.id === currentCardId);
      if (!card) return;
      card.content = board.value;
      card.updatedAt = Date.now();
      saveCards(cards);
      showToast('✓ Saved');
      setTimeout(() => goHome(), 600);
    }

    function deleteCard(e, id) {
      e.stopPropagation();
      cards = cards.filter(c => c.id !== id);
      saveCards(cards);
      renderHome();
    }

    // ── Editor ─────────────────────────────────────────────────────
    board.addEventListener('input', () => {
      if (isApplying) return;
      updateStats();
      clearTimeout(debounce);
      debounce = setTimeout(() => snapshot(board.value), 400);
    });

    function snapshot(value) {
      hist = hist.slice(0, idx + 1);
      if (hist[idx] === value) return;
      hist.push(value);
      idx = hist.length - 1;
      refreshButtons();
    }

    function refreshButtons() {
      undoBtn.disabled = idx <= 0;
      redoBtn.disabled = idx >= hist.length - 1;
    }

    function updateStats() {
      const v = board.value;
      charNum.textContent = v.length.toLocaleString();
      lineNum.textContent = v ? v.split('\n').length.toLocaleString() : '0';
    }

    function applyHist() {
      clearTimeout(debounce);
      isApplying = true;
      board.value = hist[idx];
      isApplying = false;
      updateStats();
      refreshButtons();
    }

    function doUndo() {
      if (idx <= 0) return;
      clearTimeout(debounce);
      if (hist[idx] !== board.value) snapshot(board.value);
      idx--;
      applyHist();
      showToast('↩ Undone');
    }

    function doRedo() {
      if (idx >= hist.length - 1) return;
      idx++;
      applyHist();
      showToast('↪ Redone');
    }

    function clearBoard() {
      if (!board.value) return;
      snapshot(board.value);
      board.value = '';
      snapshot('');
      updateStats();
      showToast('Cleared');
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (!text) { showToast('Clipboard is empty', 'error'); return; }
        const s = board.selectionStart, e = board.selectionEnd;
        board.value = board.value.slice(0, s) + text + board.value.slice(e);
        board.selectionStart = board.selectionEnd = s + text.length;
        snapshot(board.value);
        updateStats();
        showToast('↓ Pasted ' + text.length.toLocaleString() + ' chars');
      } catch {
        board.focus();
        showToast('Press Ctrl+V to paste', 'error');
      }
    }

    async function copyToClipboard() {
      if (!board.value) { showToast('Nothing to copy', 'error'); return; }
      try {
        await navigator.clipboard.writeText(board.value);
        showToast('↑ Copied ' + board.value.length.toLocaleString() + ' chars');
      } catch {
        board.select();
        document.execCommand('copy');
        showToast('Copied!');
      }
    }

    // ── Voice ──────────────────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;

    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.title = 'Not supported in this browser';
    }

    function toggleVoice() {
      if (!SpeechRecognition) { showToast('Not supported', 'error'); return; }
      if (isListening) { stopVoice(); showToast('Stopped recording'); return; }
      startVoice();
    }

    function startVoice() {
      if (isListening) return;
      isListening = true;
      micBtn.classList.add('listening');
      showToast('🎤 Listening… tap mic to stop');

      let committed = board.value;

      function newSession() {
        if (!isListening) return;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = true;

        recognition.onresult = (e) => {
          let interim = '', final = '';
          for (let i = 0; i < e.results.length; i++) {
            if (e.results[i].isFinal) final += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
          }
          if (final) committed += final;
          board.value = committed + interim;
          board.selectionStart = board.selectionEnd = board.value.length;
          updateStats();
        };

        recognition.onerror = (e) => {
          if (e.error === 'no-speech') return;
          if (e.error === 'aborted')   return;
          stopVoice();
          showToast('Mic error: ' + e.error, 'error');
        };

        recognition.onend = () => {
          if (isListening) {
            setTimeout(newSession, 80); // restart to keep mic open
          } else {
            snapshot(board.value);
          }
        };

        try { recognition.start(); } catch(e) { stopVoice(); }
      }

      newSession();
    }

    function stopVoice() {
      if (!isListening) return;
      isListening = false;
      micBtn.classList.remove('listening');
      if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
      snapshot(board.value);
    }

    // ── Keyboard shortcuts ─────────────────────────────────────────
    document.addEventListener('keydown', e => {
      const mod = e.ctrlKey || e.metaKey;
      if (mod && !e.shiftKey && e.key === 'z') { e.preventDefault(); doUndo(); }
      if (mod && e.shiftKey  && e.key === 'z') { e.preventDefault(); doRedo(); }
      if (mod && !e.shiftKey && e.key === 'y') { e.preventDefault(); doRedo(); }
    });

    // ── Toast ──────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'success') {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2200);
    }

    // ── Helpers ────────────────────────────────────────────────────
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
        + ' · ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    }

    // ── Init ───────────────────────────────────────────────────────
    renderHome();
  </script>
</body>
</html>
